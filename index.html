<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>常用漢字 2,136 字 一覽表</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;600;700&family=Noto+Sans+TC:wght@400;500;700&family=Zen+Maru+Gothic:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --paper: #F6F1E6;
    --paper-alt: #EFE7D6;
    --ink: #2A2620;
    --ink-soft: #6B6252;
    --indigo: #223A5E;
    --indigo-soft: #3C567C;
    --shu: #B7472A;
    --shu-soft: #D97757;
    --rule: #D8CDB4;
    --card: #FCFAF3;
    --tab-color: #223A5E;
  }

  * { box-sizing: border-box; }

  body {
    margin: 0;
    background: var(--paper);
    color: var(--ink);
    font-family: 'Noto Sans TC', system-ui, sans-serif;
    -webkit-font-smoothing: antialiased;
  }

  .app {
    display: block;
    min-height: 100vh;
  }

  /* ---------- Drawer: dictionary thumb-index tabs (off-canvas overlay) ---------- */
  .drawer {
    width: 220px;
    background: var(--paper-alt);
    border-right: 1px solid var(--rule);
    display: flex;
    flex-direction: column;
    align-items: stretch;
    padding: 20px 0;
    position: fixed;
    left: 0;
    top: 0;
    bottom: 0;
    height: 100vh;
    z-index: 30;
    transform: translateX(-100%);
    transition: transform .22s ease;
    box-shadow: 4px 0 20px rgba(0,0,0,0.18);
  }

  .drawer.open {
    transform: translateX(0);
  }

  .drawer-title {
    font-family: 'Noto Serif JP', serif;
    font-weight: 700;
    letter-spacing: 0.1em;
    font-size: 16px;
    color: var(--indigo);
    text-align: left;
    padding: 0 16px 14px;
    margin: 0 0 8px;
    border-bottom: 1px solid var(--rule);
  }

  .tabs {
    display: flex;
    flex-direction: column;
    gap: 6px;
    padding: 4px 14px;
    overflow-y: auto;
  }

  .tab-section-label {
    font-family: 'Noto Sans TC', sans-serif;
    font-size: 10.5px;
    font-weight: 700;
    letter-spacing: 0.15em;
    color: var(--ink-soft);
    padding: 10px 4px 2px 6px;
  }
  .tab-section-label:first-child { padding-top: 2px; }

  .tab {
    position: relative;
    border: none;
    background: var(--card);
    color: var(--ink-soft);
    border-left: 6px solid var(--tab-color);
    border-radius: 3px 8px 8px 3px;
    padding: 9px 10px;
    cursor: pointer;
    text-align: left;
    font-family: 'Noto Serif JP', serif;
    display: flex;
    flex-direction: row;
    align-items: center;
    justify-content: space-between;
    gap: 8px;
    transition: transform .15s ease, box-shadow .15s ease, background .15s ease;
    box-shadow: 1px 1px 0 rgba(42,38,32,0.06);
  }

  .tab:hover {
    transform: translateX(2px);
    box-shadow: 2px 2px 0 rgba(42,38,32,0.10);
  }

  .tab.active {
    background: var(--tab-color);
    color: #fff;
    transform: translateX(4px);
    box-shadow: 2px 2px 0 rgba(42,38,32,0.18);
  }

  .tab-label {
    font-size: 14.5px;
    font-weight: 600;
    letter-spacing: 0.05em;
  }

  .tab-count {
    font-family: 'Noto Sans TC', sans-serif;
    font-size: 10px;
    opacity: 0.75;
  }

  .drawer-toggle {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    border: 1px solid var(--indigo);
    background: var(--card);
    color: var(--indigo);
    border-radius: 20px;
    padding: 9px 16px;
    font-size: 13.5px;
    font-family: 'Noto Sans TC', sans-serif;
    cursor: pointer;
    margin-bottom: 18px;
    transition: background .15s, color .15s;
    position: sticky;
    top: 12px;
    z-index: 20;
    box-shadow: 0 4px 14px rgba(0,0,0,0.12);
  }
  .drawer-toggle:hover {
    background: var(--indigo);
    color: #fff;
  }

  .drawer-backdrop {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(20,20,15,0.35);
    z-index: 25;
  }
  .drawer-backdrop.show { display: block; }

  /* ---------- Main content ---------- */
  main {
    padding: 32px 40px 80px;
    max-width: 1100px;
    margin: 0 auto;
  }

  header.page-head {
    margin-bottom: 24px;
    border-bottom: 2px solid var(--indigo);
    padding-bottom: 16px;
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 16px;
  }

  h1 {
    font-family: 'Noto Serif JP', serif;
    font-weight: 700;
    font-size: 17px;
    margin: 0;
    color: var(--indigo);
    letter-spacing: 0.03em;
  }

  h1 small {
    display: block;
    font-family: 'Noto Sans TC', sans-serif;
    font-size: 13px;
    font-weight: 400;
    color: var(--ink-soft);
    margin-top: 4px;
  }

  #current-grade-label {
    font-family: 'Noto Serif JP', serif;
    font-size: 15px;
    color: var(--shu);
    font-weight: 600;
  }

  .toolbar {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .toolbar input[type="search"] {
    font-family: 'Noto Sans TC', sans-serif;
    font-size: 14px;
    padding: 9px 14px;
    border: 1px solid var(--rule);
    border-radius: 20px;
    background: var(--card);
    color: var(--ink);
    width: 220px;
    outline: none;
    transition: border-color .15s;
  }
  .toolbar input[type="search"]:focus { border-color: var(--indigo-soft); }

  .count-badge {
    font-size: 12px;
    color: var(--ink-soft);
    white-space: nowrap;
  }

  /* ---------- Table ---------- */
  .table-wrap {
    background: var(--card);
    border: 1px solid var(--rule);
    border-radius: 10px;
    max-height: 70vh;
    overflow-y: auto;
  }

  table {
    width: 100%;
    border-collapse: collapse;
    font-size: 14px;
  }

  thead th {
    background: var(--indigo);
    color: #fff;
    font-family: 'Noto Sans TC', sans-serif;
    font-weight: 500;
    text-align: left;
    padding: 10px 14px;
    position: sticky;
    top: 0;
    font-size: 12.5px;
    letter-spacing: 0.03em;
  }
  thead tr:first-child th:first-child { border-top-left-radius: 10px; }
  thead tr:first-child th:last-child { border-top-right-radius: 10px; }

  tbody tr {
    border-bottom: 1px solid var(--rule);
  }
  tbody tr:nth-child(even) { background: rgba(178,150,90,0.06); }
  tbody tr:hover { background: rgba(183,71,42,0.07); }

  td {
    padding: 10px 14px;
    vertical-align: top;
  }

  td.no {
    color: var(--ink-soft);
    font-variant-numeric: tabular-nums;
  }
  /* # 欄：編號最多三位數（各年級 1～200），寬度只需包住三位數字 */
  td.no, thead th.col-no {
    width: 32px;
    padding-left: 3px;
    padding-right: 3px;
    white-space: nowrap;
    text-align: center;
  }

  td.kanji {
    font-family: 'Noto Serif JP', serif;
    font-weight: 600;
    color: var(--indigo);
    text-align: center;
  }
  /* 漢字欄：寬度只需包住漢字字元、播放鈕與「漢字」標題 */
  td.kanji, thead th.col-kanji {
    width: 32px;
    padding-left: 3px;
    padding-right: 3px;
    white-space: nowrap;
    text-align: center;
  }
  .kanji-char {
    display: block;
    font-size: 20px;
    line-height: 1.1;
  }

  td.on {
    color: var(--ink-soft);
    font-size: 13px;
    width: 190px;
  }

  td.sentence {
    overflow-wrap: break-word;
    word-break: break-word;
  }

  button.play-btn {
    width: 20px;
    height: 20px;
    border-radius: 50%;
    border: 1px solid var(--indigo-soft);
    background: var(--paper);
    color: var(--indigo);
    cursor: pointer;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    font-size: 9px;
    transition: background .15s, color .15s, transform .1s;
    margin: 6px auto 0;
  }
  button.play-btn:hover {
    background: var(--indigo);
    color: #fff;
  }
  button.play-btn:active { transform: scale(0.92); }
  button.play-btn.playing {
    background: var(--shu);
    border-color: var(--shu);
    color: #fff;
  }

  .sentence-text {
    font-family: 'Zen Maru Gothic', 'Noto Sans TC', sans-serif;
    font-size: 15px;
    color: var(--ink);
    line-height: 1.5;
  }

  .romaji {
    display: block;
    font-family: 'Noto Sans TC', sans-serif;
    font-size: 12px;
    color: var(--shu-soft);
    font-style: italic;
    margin-top: 2px;
  }

  td.zh {
    width: 190px;
    vertical-align: top;
  }

  .zh-meaning {
    display: block;
    color: var(--ink);
    font-size: 13px;
    font-weight: 500;
    line-height: 1.5;
  }

  .sent-zh {
    display: block;
    margin-top: 4px;
    padding-top: 4px;
    border-top: 1px dashed var(--rule);
    color: var(--indigo-soft);
    font-size: 12.5px;
    line-height: 1.5;
  }

  .empty-state {
    padding: 60px 20px;
    text-align: center;
    color: var(--ink-soft);
    font-family: 'Noto Serif JP', serif;
  }

  .no-tts-banner {
    display: none;
    background: #FBE8E2;
    color: var(--shu);
    border: 1px solid var(--shu-soft);
    padding: 10px 16px;
    border-radius: 8px;
    font-size: 13px;
    margin-bottom: 16px;
  }

  footer.note {
    margin-top: 28px;
    font-size: 12px;
    color: var(--ink-soft);
    line-height: 1.7;
    border-top: 1px solid var(--rule);
    padding-top: 14px;
  }

  /* ---------- Small screens ---------- */
  @media (max-width: 760px) {
    main { padding: 20px 16px 60px; }
    .toolbar input[type="search"] { width: 150px; }
    td.on, thead th:nth-child(3) { display: none; }
    td.zh, thead th:nth-child(5) { font-size: 12px; width: 120px !important; }
    thead th { font-size: 11px; padding: 8px 6px; }
    td { padding: 8px 6px; }
    td.kanji, thead th.col-kanji { width: 32px; }
    .kanji-char { font-size: 18px; }
    .sentence-text { font-size: 13.5px; }
    .romaji { font-size: 11px; }
    .zh-meaning { font-size: 12px; }
    .sent-zh { font-size: 11px; }
  }
</style>
</head>

    <div class="tabs" id="tabs">

  </aside>
  <div class="drawer-backdrop" id="backdrop"></div>

  <main>
    <button class="drawer-toggle" id="drawerToggle">☰ 選擇年級</button>

    <header class="page-head">
      <div>
        <h1>目前顯示：<span id="current-grade-label"></span></h1>
      </div>
      <div class="toolbar">
        <input type="search" id="search" placeholder="搜尋漢字／讀音／字義…">

    <div class="no-tts-banner" id="ttsBanner">此瀏覽器不支援語音朗讀（Web Speech API），例句仍可正常瀏覽，但按鈕無法發聲。</div>

    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th class="col-no">#</th>

    <footer class="note">
      資料來源：讀音整理自公開的 Kanjidic2 衍生資料集；例句多數取自 Tatoeba 開放語料庫（少數罕用字為手動編寫），羅馬拼音以形態素分析（fugashi / UniDic）自動產生，可能偶有斷詞或讀音誤差。語音朗讀使用瀏覽器內建 Web Speech API（需系統或瀏覽器安裝日文語音），不同裝置發音品質可能不同。內容僅供學習參考，正式使用建議另行查證辭典。
    </footer>
  </main>

const GRADE_NAMES = {"1": "小學一年級", "2": "小學二年級", "3": "小學三年級", "4": "小學四年級", "5": "小學五年級", "6": "小學六年級", "81": "中學常用漢字（1/6・較常見）", "82": "中學常用漢字（2/6）", "83": "中學常用漢字（3/6）", "84": "中學常用漢字（4/6）", "85": "中學常用漢字（5/6）", "86": "中學常用漢字（6/6・較罕見）"};

let currentGrade = 1;
let currentQuery = "";

const tbody = document.getElementById('tbody');
const emptyState = document.getElementById('emptyState');
const countBadge = document.getElementById('count-badge');
const gradeLabel = document.getElementById('current-grade-label');
const searchInput = document.getElementById('search');

function escapeHtml(str) {
  return str.replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

function render() {
  const q = currentQuery.trim();
  const rows = DATA.filter(d => d.g === currentGrade && (
    !q || d.k.includes(q) || d.on.includes(q) || d.z.includes(q) || d.s.includes(q) || d.sz.includes(q)
  ));

  gradeLabel.textContent = GRADE_NAMES[currentGrade] + '（共 ' + DATA.filter(d=>d.g===currentGrade).length + ' 字）';
  countBadge.textContent = q ? ('符合 ' + rows.length + ' 字') : '';

  if (rows.length === 0) {
    tbody.innerHTML = '';
    emptyState.style.display = 'block';
    return;
  }
  emptyState.style.display = 'none';

  const html = rows.map((d, i) => `
    <tr>
      <td class="no">${d.no}</td>
      <td class="kanji">
        <span class="kanji-char">${d.k}</span>
        <button class="play-btn" data-text="${escapeHtml(d.s)}" title="播放語音" onclick="playSentence(this)">&#9658;</button>
      </td>
      <td class="on">${escapeHtml(d.on)}</td>
      <td class="sentence">
        <span class="sentence-text">${escapeHtml(d.s)}</span>
        <span class="romaji">${escapeHtml(d.r)}</span>
      </td>
      <td class="zh">
        <span class="zh-meaning">${escapeHtml(d.z)}</span>
        <span class="sent-zh">${escapeHtml(d.sz)}</span>
      </td>
    </tr>
  `).join('');
  tbody.innerHTML = html;

  // 強制重新計算版面：table 內容動態塞入後，thead 的 position:sticky
  // 有時不會自動重新定位，讀取一次 offsetHeight 觸發 reflow 來修正。
  document.querySelectorAll('thead th').forEach(th => {
    th.style.position = 'static';
    void th.offsetHeight;
    th.style.position = 'sticky';
  });
}

// ---------- Speech ----------
let synthVoice = null;
function pickVoice() {
  if (!('speechSynthesis' in window)) return;
  const voices = window.speechSynthesis.getVoices();
  synthVoice = voices.find(v => v.lang && v.lang.toLowerCase().startsWith('ja')) || null;
}
if ('speechSynthesis' in window) {
  pickVoice();
  window.speechSynthesis.onvoiceschanged = pickVoice;
} else {
  document.getElementById('ttsBanner').style.display = 'block';
}

let activeBtn = null;
function playSentence(btn) {
  if (!('speechSynthesis' in window)) return;
  const text = btn.getAttribute('data-text');
  window.speechSynthesis.cancel();
  if (activeBtn) activeBtn.classList.remove('playing');
  const utter = new SpeechSynthesisUtterance(text);
  utter.lang = 'ja-JP';
  if (synthVoice) utter.voice = synthVoice;
  utter.rate = 0.95;
  btn.classList.add('playing');
  activeBtn = btn;
  utter.onend = () => { btn.classList.remove('playing'); if (activeBtn === btn) activeBtn = null; };
  utter.onerror = () => { btn.classList.remove('playing'); };
  window.speechSynthesis.speak(utter);
}
window.playSentence = playSentence;

// ---------- Drawer / tabs ----------
const tabs = document.querySelectorAll('.tab');
const drawer = document.getElementById('drawer');
const backdrop = document.getElementById('backdrop');
const drawerToggle = document.getElementById('drawerToggle');

tabs.forEach(tab => {
  tab.addEventListener('click', () => {
    tabs.forEach(t => t.classList.remove('active'));
    tab.classList.add('active');
    currentGrade = parseInt(tab.getAttribute('data-grade'), 10);
    searchInput.value = "";
    currentQuery = "";
    render();
    drawer.classList.remove('open');
    backdrop.classList.remove('show');
    window.scrollTo({top:0, behavior:'smooth'});
  });
});

drawerToggle.addEventListener('click', () => {
  drawer.classList.toggle('open');
  backdrop.classList.toggle('show');
});
backdrop.addEventListener('click', () => {
  drawer.classList.remove('open');
  backdrop.classList.remove('show');
});

searchInput.addEventListener('input', (e) => {
  currentQuery = e.target.value;
  render();
});

// init
tabs[0].classList.add('active');
render();
</script>
